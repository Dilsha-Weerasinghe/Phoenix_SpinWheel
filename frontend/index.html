<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phoenix Spin Wheel</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <img src="https://i.postimg.cc/qBNDJ431/imgi-41-PHONIX-LOGO-02.png" alt="Phonix Logo" class="company-logo">
    <div class="app-container">
        <div class="left-panel">
            <div class="title-container">
                <span class="word-spin">SPIN</span>
                <span class="word-amp">&</span>
                <span class="word-win">WIN</span>
            </div>
            <p id="status-text"></p>
        </div>

        <main class="right-panel">
            <div class="wheel-container">
                <div class="pointer"></div>
                <div class="wheel" id="wheel">
                    <svg viewBox="0 0 100 100" class="wheel-svg" style="transform: rotate(-30deg);">
                        <!-- Segment 0: 0-60deg — T-Shirt (pink) -->
                        <path d="M50,50 L50,0 A50,50 0 0,1 93.30,25 Z" fill="#dd5a26" />
                        <text transform="translate(50,50) rotate(30) translate(0,-33)" fill="white" font-size="5.5"
                            font-weight="bold" text-anchor="middle" dominant-baseline="middle">T-Shirt</text>

                        <!-- Segment 1: 60-120deg — GAME OVER (dark) -->
                        <path d="M50,50 L93.30,25 A50,50 0 0,1 93.30,75 Z" fill="#424A54" />
                        <text transform="translate(50,50) rotate(90) translate(0,-33)" fill="white" font-size="5"
                            font-weight="bold" text-anchor="middle" dominant-baseline="middle">
                            <tspan x="0" dy="-0.6em">GAME</tspan>
                            <tspan x="0" dy="1.2em">OVER</tspan>
                        </text>

                        <!-- Segment 2: 120-180deg — Cap (pink) -->
                        <path d="M50,50 L93.30,75 A50,50 0 0,1 50,100 Z" fill="#dd5a26" />
                        <text transform="translate(50,50) rotate(150) translate(0,-33)" fill="white" font-size="5.5"
                            font-weight="bold" text-anchor="middle" dominant-baseline="middle">Cap</text>

                        <!-- Segment 3: 180-240deg — GAME OVER (dark) -->
                        <path d="M50,50 L50,100 A50,50 0 0,1 6.70,75 Z" fill="#424A54" />
                        <text transform="translate(50,50) rotate(210) translate(0,-33)" fill="white" font-size="5"
                            font-weight="bold" text-anchor="middle" dominant-baseline="middle">
                            <tspan x="0" dy="-0.6em">GAME</tspan>
                            <tspan x="0" dy="1.2em">OVER</tspan>
                        </text>

                        <!-- Segment 4: 240-300deg — Shoe Rack (pink) -->
                        <path d="M50,50 L6.70,75 A50,50 0 0,1 6.70,25 Z" fill="#dd5a26" />
                        <text transform="translate(50,50) rotate(270) translate(0,-33)" fill="white" font-size="4.5"
                            font-weight="bold" text-anchor="middle" dominant-baseline="middle">Shoe Rack</text>

                        <!-- Segment 5: 300-360deg — GAME OVER (dark) -->
                        <path d="M50,50 L6.70,25 A50,50 0 0,1 50,0 Z" fill="#424A54" />
                        <text transform="translate(50,50) rotate(330) translate(0,-33)" fill="white" font-size="5"
                            font-weight="bold" text-anchor="middle" dominant-baseline="middle">
                            <tspan x="0" dy="-0.6em">GAME</tspan>
                            <tspan x="0" dy="1.2em">OVER</tspan>
                        </text>
                    </svg>
                </div>
                <button class="spin-button" id="spin-btn" disabled>SPIN!</button>
            </div>

            <div class="prizes-sidebar single-prize-box">
                <div class="prize-item">
                    <img src="https://i.postimg.cc/Hk11zsJh/imgi-240-standard-plain-round-neck-shirt-white-3f96896d-60d3-4b52-b0d2-dfc42cf1462b-large.png"
                        alt="T-Shirt">
                    <span>T-Shirt</span>
                </div>
                <div class="prize-item">
                    <img src="https://i.postimg.cc/ZRjv4MNR/Untitled-design-removebg-preview-(3).png" alt="Cap">
                    <span>Cap</span>
                </div>
                <div class="prize-item">
                    <img src="https://i.postimg.cc/nhW7ggJ0/Whats-App-Image-2026-04-07-at-4-44-07-PM-removebg-preview.png"
                        alt="Shoe Rack">
                    <span>Shoe Rack</span>
                </div>
            </div>
        </main>

        <div class="modal-overlay" id="result-modal">
            <div class="modal">
                <img id="prize-image" src="" alt="Prize" style="display: none; max-width: 250px; max-height: 250px; margin: 0 auto 1.5rem auto; object-fit: contain;">
                <h2 id="result-title">You Won!</h2>
                <p id="result-desc"></p>
                <button class="modal-btn" id="modal-action-btn" onclick="closeModal()">Awesome!</button>
            </div>
        </div>
    </div>

    <script src="main.js"></script>
</body>

</html>
